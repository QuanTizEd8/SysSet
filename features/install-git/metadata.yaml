id: install-git
version: 0.2.0
name: Git Installer
description: 'Install Git in the development container. Two strategies controlled by ''method'': ''package'' uses the OS package manager (with Ubuntu git-core PPA on Ubuntu when version=latest); ''source'' builds from a kernel.org tarball for full version control on any platform. Version is controlled independently by the ''version'' option: ''latest'', ''stable'', or a specific version string.'
options:
  method:
    type: string
    default: package
    description: |-
      Installation strategy.
      'package' (default) — install via the OS package manager. On Ubuntu with version=latest, activates the git-core PPA (ppa:git-core/ppa) to provide the newest upstream stable release; all other platforms and version values use their native package manager directly. On macOS, delegates to Homebrew.
      'source' — build from a kernel.org source tarball. Requires a C toolchain and build dependencies (installed automatically). Version is controlled by the 'version' option. Works on all supported Linux distributions and macOS (requires Xcode CLT).
    enum:
    - package
    - source
  version:
    type: string
    default: latest
    description: |-
      Version of git to install.
      'latest' (default) — with method=package: newest available package (Ubuntu PPA on Ubuntu, native package manager elsewhere; Homebrew on macOS already tracks latest). With method=source: builds the newest tag from the GitHub Tags API, including release candidates.
      'stable' — with method=package: native package manager without PPA activation, even on Ubuntu. With method=source: builds the newest stable release (release candidates excluded).
      A version string (e.g. '2.47.2', '2.47.0-rc1') — with method=package: passes the version to the package manager (user is responsible for availability). With method=source: builds exactly that version from the kernel.org tarball.
    proposals:
    - latest
    - stable
  prefix:
    type: string
    default: auto
    description: |-
      Installation prefix for source builds (passed as prefix= to make install).
      'auto' (default) — resolves to /usr/local when running as root, or $HOME/.local when running as a non-root user.
      An explicit path — used as-is; the script exits with an error if the path is not writable and cannot be created.
  sysconfdir:
    type: string
    default: auto
    description: |-
      System configuration directory for source builds (passed as sysconfdir= to make). Git reads <sysconfdir>/gitconfig as its system-level config file.
      'auto' (default) — resolves to /etc when running as root, or $HOME/.config when running as a non-root user.
      An explicit path — used as-is; the script exits with an error if the path is not writable and cannot be created.
  installer_dir:
    type: string
    default: /tmp/git-build
    description: |-
      Working directory for the source build: tarball download, extraction, and compilation happen here.
      Removed after a successful build unless keep_installer=true.
      Ignored when method=package.
  keep_installer:
    type: boolean
    default: false
    description: |-
      Keep the source build directory (installer_dir) after a successful install.
      Useful for debugging build failures or inspecting the compiled binaries.
      Ignored when method=package.
  no_flags:
    type: array
    default: ''
    description: |-
      Components to exclude from the source build (case-insensitive).
      Available values: 'perl', 'python', 'tcltk', 'gettext'. Each value maps to the corresponding NO_<FLAG>=YesPlease make variable.
      'perl' — disables Perl scripts (git-svn, git-send-email, git-archimport, git-cvsimport, gitweb) and removes the Perl runtime requirement.
      'python' — disables Python scripts (git-p4) and removes the Python runtime requirement.
      'tcltk' — disables Tcl/Tk GUI tools (gitk, git-gui) and removes the Tcl/Tk requirement.
      'gettext' — disables i18n/translation support; git output is English-only and the gettext/libintl build dependency is removed.
      Unknown values are logged as warnings and ignored. Silently ignored when method=package.
      On Alpine Linux, gettext is always disabled regardless of this option (required for a successful build).
  make_flags:
    type: string
    default: ''
    description: Additional flags appended verbatim last to the make invocation for source builds (space-separated KEY=VALUE pairs, e.g. 'NO_CURL=YesPlease OPENSSL_SHA256=YesPlease'). Appended after all computed flags including no_flags, so last-position values take effect. No validation — unknown flags are silently ignored by make. Silently ignored when method=package.
  export_path:
    type: string
    default: auto
    description: |-
      Controls PATH and MANPATH export for source builds.
      'auto' (default) — writes idempotent export blocks to all system-wide shell startup files: the BASH_ENV file (non-login non-interactive bash, registered in /etc/environment), /etc/profile.d/install-git.sh (login shells), the system-wide bashrc (non-login interactive bash), and <zshdir>/zshenv (all zsh). This covers login, interactive, non-interactive, Docker RUN, SSH exec, and PAM invocation scenarios.
      '' (empty string) — skips all PATH/MANPATH writes.
      A newline-separated list of absolute file paths — writes only to those files.
      Ignored when method=package (git lands in /usr/bin which is universally on PATH).
  shell_completions:
    type: array
    default: "bash\nzsh"
    description: |
      Shell names to install completion scripts for after a source build.
      Supported shells: 'bash', 'zsh'.
      As root: copies git-completion.bash to /etc/bash_completion.d/git and git-completion.zsh to <zshdir>/completions/_git (where <zshdir> is detected by shell__detect_zshdir).
      As non-root: copies to $HOME/.local/share/bash-completion/completions/git (bash) and $HOME/.zfunc/_git (zsh).
      The source files are taken from $PREFIX/share/git-core/contrib/completion/ which is populated by make install.
      Set to '' to skip all completion writes.
      Ignored when method=package (completions are installed by the package manager).
      Examples: 'bash zsh', 'bash', 'zsh', ''.
  if_exists:
    type: string
    default: update
    description: |-
      What to do when git is already present in PATH before installation begins.
      If the installed version already matches the resolved target version, installation is always skipped silently regardless of this setting.
      'skip' — log a notice and exit successfully without making any changes (idempotent).
      'fail' — print an error and exit non-zero.
      'reinstall' — detect how git is currently installed, uninstall it, then install fresh using the selected method. Detection is per-platform: dpkg (Debian/Ubuntu), apk (Alpine), rpm (RHEL/Fedora), brew (macOS). If the existing git is package-managed, it is removed via the package manager; if source-installed, all files under prefix and the equivs dummy package (Debian/Ubuntu only) are removed before reinstalling.
      'update' — upgrade to the resolved target version. Detects the existing install method and compares it to the requested method. Same-method updates proceed in place (package manager re-runs natively; source rebuild overwrites binaries if the prefix matches, or removes the old prefix first if it differs). Method-switch updates (e.g. package→source or source→package) behave identically to reinstall.
    enum:
    - skip
    - fail
    - reinstall
    - update
  default_branch:
    type: string
    default: main
    description: Sets init.defaultBranch in the system-level gitconfig (/etc/gitconfig as root, $HOME/.config/git/config as non-root). Applies to all newly initialised repositories. Set to '' to skip writing this setting.
  safe_directory:
    type: string
    default: '*'
    description: Sets safe.directory in the system-level gitconfig. Use '*' (default) to trust all directories (useful in containers where the working directory may be owned by a different UID), a specific absolute path, or a newline-separated list of paths. Set to '' to skip writing this setting.
  system_gitconfig:
    type: string
    default: ''
    description: |-
      Freeform content to append to the system-level gitconfig (as root: /etc/gitconfig; as non-root: $HOME/.config/git/config). Accepts standard gitconfig format, e.g. '[core]
        autocrlf = input
      [push]
        default = simple'. Written after any settings from default_branch and safe_directory. Set to '' to skip.
  add_current_user:
    type: boolean
    default: true
    description: |-
      Include the current user (the user running the installer, or SUDO_USER if set) in the resolved user list for per-user gitconfig writes.
      Root is deferred: only included as a fallback when no other non-root user is resolved.
  add_remote_user:
    type: boolean
    default: true
    description: |-
      Include the devcontainer remoteUser (from the _REMOTE_USER env var) in the resolved user list for per-user gitconfig writes.
      Ignored when _REMOTE_USER is unset or empty. Root is excluded from this path.
  add_container_user:
    type: boolean
    default: true
    description: |-
      Include the devcontainer containerUser (from the _CONTAINER_USER env var) in the resolved user list for per-user gitconfig writes.
      Ignored when _CONTAINER_USER is unset or empty. Root is excluded from this path.
  add_users:
    type: array
    default: ''
    description: |-
      Additional usernames to include in the resolved user list for per-user gitconfig writes.
      Root is accepted here (unlike the auto-detected paths above).
  user_name:
    type: string
    default: ''
    description: Sets user.name in the per-user gitconfig (~/.gitconfig) for all resolved users. Set to '' to skip writing this setting.
  user_email:
    type: string
    default: ''
    description: Sets user.email in the per-user gitconfig (~/.gitconfig) for all resolved users. Set to '' to skip writing this setting.
  user_gitconfig:
    type: string
    default: ''
    description: Freeform content to append to the per-user gitconfig (~/.gitconfig) for all resolved users. Accepts standard gitconfig format. Written after user_name and user_email settings. Set to '' to skip.
  symlink:
    type: boolean
    default: true
    description: |-
      Create a symlink from the canonical bin directory to $prefix/bin/git when prefix resolves to a non-default path (source builds only).
      Root: creates /usr/local/bin/git -> $prefix/bin/git. Non-root: creates $HOME/.local/bin/git -> $prefix/bin/git.
      Ensures the containerEnv PATH entries always resolve to the installed binary regardless of the chosen prefix.
      No-op when method=package (git is already in /usr/bin), or when prefix already resolves to the canonical path (/usr/local for root, $HOME/.local for non-root).
containerEnv:
  PATH: ${HOME}/.local/bin:${PATH}
installsAfter: []
dependencies:
  run:
    base:
      packages:
        - ca-certificates
    os-pkg:
      packages:
        - git
  build:
    source-build:
      packages:
        - curl
        - tar

      apt:
        packages:
          - build-essential
          - gettext
          - libcurl4-openssl-dev
          - libexpat1-dev
          - libpcre2-dev
          - libssl-dev
          - zlib1g-dev
          # libpcre2-posix package name varies by Debian/Ubuntu release.
          - name: libpcre2-posix3
            when:
              version_codename: [bookworm, trixie, jammy, noble, plucky, oracular]
          - name: libpcre2-posix2
            when:
              version_codename: [focal, bullseye]
          - name: libpcre2-posix0
            when:
              version_codename: [bionic, buster]

      brew:
        packages:
          - make
          - openssl
          - pcre2
          - gettext

      dnf:
        packages:
          - gcc
          - make
          - gettext-devel
          - libcurl-devel
          - expat-devel
          - openssl-devel
          - pcre2-devel
          - perl-devel
          - zlib-devel

      apk:
        packages:
          - make
          - gcc
          - g++
          - musl-dev
          - curl-dev
          - expat-dev
          - openssl-dev
          - pcre2-dev
          - perl-dev
          - zlib-dev

      zypper:
        packages:
          - gcc
          - make
          - gettext-tools
          - libcurl-devel
          - libexpat-devel
          - libopenssl-devel
          - libpcre2-devel
          - zlib-devel

      pacman:
        packages:
          - base-devel
          - pcre2
          - curl
          - expat
          - openssl
          - zlib
