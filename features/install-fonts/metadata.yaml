id: install-fonts
version: 0.1.0
name: Font Installation
description: >-
  Install fonts from [Nerd Fonts](https://www.nerdfonts.com/) by name,
  from [GitHub release](https://docs.github.com/en/repositories/releasing-projects-on-github/about-releases) assets by repository slug,
  from the [Powerlevel10k MesloLGS NF](https://github.com/romkatv/powerlevel10k-media) fonts,
  or from arbitrary URLs to individual font files or archives.
options:
  nerd_fonts:
    default: "Meslo\nJetBrainsMono"
    description: >-
      [Nerd Fonts](https://www.nerdfonts.com/) archive names to install
      (e.g. `Meslo`, `FiraCode`, `Hack`). Leave empty to skip Nerd Font downloads.
    type: array
  font_urls:
    default: ''
    description: >-
      Direct URLs to download. Font files (`.ttf`, `.otf`, `.woff`, `.woff2`)
      and archives (`.tar.xz`, `.tar.gz`, `.tgz`, `.zip`) are installed under a
      namespaced path derived from the URL. Fonts are deduplicated by PostScript name.
    type: array
  gh_release_fonts:
    default: ''
    description: >-
      GitHub slugs in `owner/repo` or `owner/repo@tag` form. All font and
      archive assets from the release are installed under
      `gh/<owner>/<repo>/<tag>/<id>/`. Without a tag, the latest release is used.
      Fonts are deduplicated by PostScript name.
    type: array
  p10k_fonts:
    default: false
    description: >-
      Install the four [MesloLGS NF](https://github.com/romkatv/powerlevel10k-media)
      fonts required by Powerlevel10k under `p10k/MesloLGS-NF/`.
    type: boolean
  overwrite:
    default: false
    description: When a font with the same PostScript name is already installed, overwrite it instead of skipping. Default is to skip and log.
    type: boolean
  font_dir:
    default: ''
    description: 'Font installation directory. Leave empty to auto-detect: root/container -> /usr/share/fonts; Linux user -> $XDG_DATA_HOME/fonts; macOS user -> ~/Library/Fonts.'
    type: string
dependencies:
  run:
    base:
      packages:
        - fontconfig
  build:
    download:
      packages:
        - ca-certificates
        - curl
        - unzip
      apt:
        packages:
          - xz-utils
      apk:
        packages:
          - xz
      dnf:
        packages:
          - xz
