packages:
  # Downloading / transfer
  - curl
  - wget
  - rsync

  # Data processing
  - jq

  # Pager / editors
  - less
  - nano
  - vim

  # Terminal multiplexer / disk usage
  - tmux
  - tree
  - ncdu

  # Interactive utilities
  - dialog
  - moreutils

  # Archive utilities
  - unzip
  - zip
  - name: xz-utils
    brew: xz
    apk: xz
    dnf: xz
    zypper: xz
    pacman: xz

  # Cryptography
  - name: gnupg
    dnf: gnupg2
    zypper: gpg2

  # Secure shell client
  - name: openssh-client
    brew: openssh
    dnf: openssh-clients
    zypper: openssh
    pacman: openssh

  # Linux-only utilities
  - name: file
    when: {kernel: linux}
