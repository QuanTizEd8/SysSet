packages:

  # ── HDF5 (array/dataset storage) ─────────────────────────────────────────
  - name: libhdf5-dev
    brew: hdf5
    apk: hdf5-dev
    dnf: hdf5-devel
    zypper: hdf5-devel
    pacman: hdf5

  # ── Linear algebra (BLAS / LAPACK) ───────────────────────────────────────
  - name: libopenblas-dev
    brew: openblas
    apk: openblas-dev
    dnf: openblas-devel
    zypper: openblas-devel
    pacman: openblas

  - name: liblapack-dev
    brew: lapack
    apk: lapack-dev
    dnf: lapack-devel
    zypper: lapack-devel
    pacman: lapack

  # ── Protocol Buffers ─────────────────────────────────────────────────────
  # Both entries map to the same 'protobuf' formula on Homebrew (idempotent).
  - name: libprotobuf-dev
    brew: protobuf
    apk: protobuf-dev
    dnf: protobuf-devel
    zypper: protobuf-devel
    pacman: protobuf

  - name: protobuf-compiler
    brew: protobuf
    apk: protobuf
    dnf: protobuf-compiler
    zypper: protobuf
    pacman: protobuf

  # ── Fourier analysis ────────────────────────────────────────────────────
  - name: libfftw3-dev
    brew: fftw
    apk: fftw-dev
    dnf: fftw-devel
    zypper: fftw3-devel
    pacman: fftw

  # ── GNU Scientific Library ────────────────────────────────────────────────
  - name: libgsl-dev
    brew: gsl
    apk: gsl-dev
    dnf: gsl-devel
    zypper: gsl-devel
    pacman: gsl

  # ── Eigen (C++ linear algebra, header-only) ───────────────────────────────
  - name: libeigen3-dev
    brew: eigen
    apk: eigen-dev
    dnf: eigen3-devel
    zypper: eigen3-devel
    pacman: eigen
