# Pre-install all source-build dependencies as root so ospkg__run can skip
# apt-get when running as the non-root vscode user (dpkg -s checks pass).
# Also install jq and yq (mikefarah-compatible) which ospkg__run requires for
# manifest parsing — these must be in PATH before the feature runs.
# libpcre2-posix3 is the noble/jammy variant; adjust for other Ubuntu codenames.
SETUP_CMD="apt-get update -qq && apt-get install -y --no-install-recommends build-essential gettext libcurl4-openssl-dev libexpat1-dev libpcre2-dev libssl-dev zlib1g-dev libpcre2-posix3 curl ca-certificates tar jq yq >/dev/null 2>&1 && useradd -m -s /bin/bash vscode && mkdir -p /opt/git && chown vscode:vscode /opt/git"
RUN_AS=vscode
