# or_selectors — OR logic via array of condition objects.
# when: [{pm: apt}, {pm: apk}] matches on both apt and apk systems.
packages:
  - name: apt-or-apk
    when: [{pm: apt}, {pm: apk}]
  - name: apt-only
    when: {pm: apt}
  - name: apk-only
    when: {pm: apk}
  - name: never
    when: {pm: fake}
