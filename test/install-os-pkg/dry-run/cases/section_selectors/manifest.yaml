# section_selectors — PM-specific blocks (apt:, apk:, dnf:) restrict packages.
# The top-level packages: list is always active on all PMs.
apt:
  packages:
    - apt-only
    - extra-apt-pkg

apk:
  packages:
    - apk-only

dnf:
  packages:
    - dnf-only

zypper:
  packages:
    - zypper-only

pacman:
  packages:
    - pacman-only

packages:
  - always-installed
