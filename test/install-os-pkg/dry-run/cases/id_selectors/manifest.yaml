# id_selectors — AND logic within a condition object: {pm: apt, id: debian} requires both to match.
# Tests that Debian and Ubuntu are distinguished even though both use apt.
packages:
  - name: common-apt-pkg
    when: {pm: apt}
  - name: debian-only
    when: {pm: apt, id: debian}
  - name: ubuntu-only
    when: {pm: apt, id: ubuntu}
