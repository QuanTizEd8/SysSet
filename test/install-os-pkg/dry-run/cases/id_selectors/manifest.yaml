# id_selectors — AND logic within a block: pm= AND id= must both match.
# Tests that Debian and Ubuntu are distinguished even though both use apt.
packages:
  - name: common-apt-pkg
    when: "pm=apt"
  - name: debian-only
    when: "pm=apt and id=debian"
  - name: ubuntu-only
    when: "pm=apt and id=ubuntu"
