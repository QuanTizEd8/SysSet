# nvm prerequisites.
# On Alpine Linux, also installs the full build toolchain required by
# nvm to compile Node.js from source (nvm install -s).
packages:
  - bash

apk:
  packages:
    - bash
    - binutils
    - ca-certificates
    - coreutils
    - curl
    - findutils
    - g++
    - gcc
    - grep
    - libgcc
    - linux-headers
    - make
    - ncurses
    - openssl
    - python3
    - util-linux
