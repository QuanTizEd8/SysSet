# Build tools for compiling native Node.js add-ons via node-gyp.
# On Alpine with method=nvm, make/gcc/g++/python3 are already provided
# by the nvm.yaml apk block and this manifest is skipped.
packages:
  - make

apt:
  packages:
    - g++
    - gcc
    - python3-minimal

apk:
  packages: []

dnf:
  packages:
    - gcc
    - gcc-c++
    - python3

brew:
  packages: []
