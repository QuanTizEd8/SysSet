name: Unit Tests

on:
  push:
    paths:
      - "lib/**"
      - "test/unit/**"
      - ".github/workflows/test-unit.yaml"
  pull_request:
    paths:
      - "lib/**"
      - "test/unit/**"
      - ".github/workflows/test-unit.yaml"
  workflow_dispatch:

jobs:
  # ── Native runners: ubuntu bare + macOS ──────────────────────────────────
  unit-native:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Sync lib into feature scripts
        run: bash sync-lib.sh

      - name: Install bash ≥4 (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Run unit tests
        run: bash test/run-unit.sh

  # ── Linux distribution containers ────────────────────────────────────────
  # Checkout/sync run on ubuntu runner; test step runs in distro container.
  # Using docker run with workspace volume mount (works with both glibc and musl).
  unit-linux:
    name: Unit tests (container / ${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:bookworm
            install: apt-get update -qq && apt-get install -y --no-install-recommends bash ca-certificates git
          - distro: fedora
            image: fedora:latest
            install: dnf install -y bash git
          - distro: rockylinux
            image: rockylinux:9
            install: dnf install -y bash git
          - distro: alpine
            image: alpine:3.20
            install: apk add --no-cache bash git

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Sync lib into feature scripts
        run: bash sync-lib.sh

      - name: Run unit tests in container
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ${{ matrix.image }} \
            sh -c "${{ matrix.install }} && bash test/run-unit.sh"
