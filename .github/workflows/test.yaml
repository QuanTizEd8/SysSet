name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: "Test ${{ matrix.feature }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: install-os-pkg
            args: "--skip-autogenerated"
          - feature: install-shell
            args: "--skip-autogenerated"
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Test ${{ matrix.feature }} scenarios"
        run: devcontainer features test -f ${{ matrix.feature }} ${{ matrix.args }} --project-folder .devcontainer .

  resolution-matrix:
    name: "Manifest resolution (${{ matrix.image }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:latest
          - image: ubuntu:latest
          - image: alpine:latest
          - image: fedora:latest
          - image: opensuse/leap:latest
          - image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: "Run manifest resolution tests"
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            "${{ matrix.image }}" \
            sh -c 'command -v bash >/dev/null 2>&1 || apk add --no-cache bash >/dev/null 2>&1; bash /repo/.devcontainer/test/install-os-pkg/dry-run/run.sh'
