name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  check-lib-sync:
    name: "Verify lib sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Verify _lib/ copies are in sync with .devcontainer/lib/"
        run: bash .devcontainer/sync-lib.sh --check

  discover:
    name: "Discover features"
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.list.outputs.features }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "List features"
        id: list
        run: |
          all_features=$(ls -1 .devcontainer/src)

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            features=$(echo "$all_features" | jq -R . | jq -sc .)
          else
            if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
              changed=$(git diff --name-only "origin/${GITHUB_BASE_REF}"...HEAD)
            else
              changed=$(git diff --name-only HEAD~1...HEAD)
            fi

            features=$(echo "$all_features" | while IFS= read -r f; do
              if echo "$changed" | grep -qE "^\.devcontainer/(src|test)/$f/"; then
                echo "$f"
              fi
            done | jq -R . | jq -sc .)
          fi

          echo "features=$features" >> "$GITHUB_OUTPUT"

  test:
    name: "Test ${{ matrix.feature }}"
    needs: discover
    if: needs.discover.outputs.features != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.discover.outputs.features) }}
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Test ${{ matrix.feature }} scenarios"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: devcontainer features test -f ${{ matrix.feature }} --skip-autogenerated --project-folder .devcontainer .

  test-install-os-pkg:
    name: "Test install-os-pkg manifest resolution (${{ matrix.image }})"
    needs: discover
    if: contains(fromJson(needs.discover.outputs.features), 'install-os-pkg')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:latest
          - image: ubuntu:latest
          - image: alpine:latest
          - image: fedora:latest
          - image: opensuse/leap:latest
          - image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: "Run manifest resolution tests"
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            "${{ matrix.image }}" \
            sh -c 'command -v bash >/dev/null 2>&1 || apk add --no-cache bash >/dev/null 2>&1; bash /repo/.devcontainer/test/install-os-pkg/dry-run/run.sh'

  test-install-miniforge-invalid-version:
    name: "Test install-miniforge rejects unknown version"
    needs: discover
    if: contains(fromJson(needs.discover.outputs.features), 'install-miniforge')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Run install script with invalid version, expect non-zero exit"
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            ubuntu:latest \
            bash -c '
              set -e
              apt-get update -qq
              apt-get install -y --no-install-recommends curl ca-certificates bash > /dev/null 2>&1
              # Run with an impossible version — must exit non-zero with a clear error.
              if VERSION=0.0.0 bash /repo/.devcontainer/src/install-miniforge/scripts/install.sh 2>&1; then
                echo "FAIL: script exited zero for unknown version 0.0.0"
                exit 1
              else
                echo "PASS: script exited non-zero for unknown version 0.0.0"
              fi
            '
