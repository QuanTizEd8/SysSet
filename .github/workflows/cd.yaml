name: "CD"

on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to publish.
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish.
        required: true

jobs:
  publish-ghcr:
    name: GHCR Publication
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || inputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Download src/ artifact (workflow_call)
        if: inputs.release_tag
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: Build src/ (workflow_dispatch fallback)
        if: "!inputs.release_tag"
        run: |
          pip3 install -r requirements.txt
          bash sync-lib.sh

      - name: Publish Features to GHCR
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR for Documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email github-actions[bot]@users.noreply.github.com
          git config --global user.name github-actions[bot]
          git config pull.rebase false
          branch=automated-documentation-update-$GITHUB_RUN_ID
          git checkout -b $branch
          message='Automated documentation update'
          git add '*/**/README.md'
          git commit -m 'Automated documentation update [skip ci]' || export NO_UPDATES=true
          if [ "$NO_UPDATES" != "true" ]; then
            git push origin "$branch"
            gh pr create --title "$message" --body "$message"
          fi

  publish-gh-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || inputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Download dist/ artifact (workflow_call)
        if: inputs.release_tag
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-dist
          path: dist/

      - name: Build dist/ (workflow_dispatch fallback)
        if: "!inputs.release_tag"
        run: |
          pip3 install -r requirements.txt
          bash sync-lib.sh
          bash build-artifacts.sh "${RELEASE_TAG}"

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "ℹ️  Release ${RELEASE_TAG} already exists — uploading/replacing assets." >&2
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
