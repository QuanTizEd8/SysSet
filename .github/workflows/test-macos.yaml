name: "CI - Test Features (macOS)"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # ── Discover which features have macOS scenarios and were changed ────────────
  discover-macos:
    name: "Discover macOS features"
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.list.outputs.features }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: "List features with macOS scenarios"
        id: list
        run: |
          # All features that have at least one test/<feature>/macos/*.sh file.
          macos_features=$(find test -mindepth 3 -maxdepth 3 -name "*.sh" -path "*/macos/*" \
            | sed 's|test/||; s|/macos/.*||' | sort -u)

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            features=$(echo "$macos_features" | grep -v '^$' | jq -R . | jq -sc .)
          else
            if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
              changed=$(git diff --name-only "origin/${GITHUB_BASE_REF}"...HEAD)
            else
              changed=$(git diff --name-only HEAD~1...HEAD)
            fi

            # Intersect: feature must be changed AND have macOS scenarios.
            features=$(echo "$macos_features" | grep -v '^$' | while IFS= read -r f; do
              if echo "$changed" | grep -qE "^(src|test)/$f/"; then
                echo "$f"
              fi
            done | jq -R . | jq -sc .)
          fi

          echo "features=${features:-[]}" >> "$GITHUB_OUTPUT"
          echo "Discovered macOS features: ${features:-[]}"

  # ── Run macOS scenarios on a macOS-hosted runner ─────────────────────────────
  test-macos:
    name: "Test ${{ matrix.feature }} (macOS)"
    needs: discover-macos
    if: needs.discover-macos.outputs.features != '[]'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.discover-macos.outputs.features) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Sync _lib/ copies from lib/"
        run: bash sync-lib.sh

      - name: "Test ${{ matrix.feature }} macOS scenarios"
        run: bash test/run-macos.sh "${{ matrix.feature }}"
