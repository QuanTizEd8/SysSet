name: "CI"

on:
  workflow_call:
    inputs:
      run_lint:
        type: string
        default: "false"
      run_validate:
        type: string
        default: "false"
      run_unit:
        type: string
        default: "false"
      run_features:
        type: string
        default: "false"
      features:
        type: string
        default: "[]"
      run_macos:
        type: string
        default: "false"
      macos_features:
        type: string
        default: "[]"
      run_dist:
        type: string
        default: "false"
      version:
        description: "Version to stamp into built artifacts (commit SHA or release tag)."
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      run_lint:
        description: "Run lint (shfmt + shellcheck)"
        type: boolean
        default: true
      run_validate:
        description: "Run validate (devcontainer-feature.json)"
        type: boolean
        default: true
      run_unit:
        description: "Run unit tests"
        type: boolean
        default: true
      run_features:
        description: "Run feature scenario tests"
        type: boolean
        default: true
      features:
        description: "Features to test — blank = all, or comma-separated names"
        type: string
        default: ""
      run_macos:
        description: "Run macOS native feature tests"
        type: boolean
        default: true
      macos_features:
        description: "macOS features to test — blank = all capable, or comma-separated names"
        type: string
        default: ""
      run_dist:
        description: "Run dist tests (get.sh, sysset.sh)"
        type: boolean
        default: true
      version:
        description: "Version to stamp into built artifacts (leave blank to use commit SHA)"
        type: string
        default: ""

jobs:
  # ── Pass through caller inputs, or resolve dispatch inputs ───────────────
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      run_lint: ${{ steps.setup.outputs.run_lint }}
      run_validate: ${{ steps.setup.outputs.run_validate }}
      run_unit: ${{ steps.setup.outputs.run_unit }}
      run_features: ${{ steps.setup.outputs.run_features }}
      features: ${{ steps.setup.outputs.features }}
      run_macos: ${{ steps.setup.outputs.run_macos }}
      macos_features: ${{ steps.setup.outputs.macos_features }}
      run_dist: ${{ steps.setup.outputs.run_dist }}
      run_prepare: ${{ steps.setup.outputs.run_prepare }}
      version: ${{ steps.setup.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Pass through inputs (workflow_call) or resolve inputs (workflow_dispatch)"
        id: setup
        env:
          INPUT_RUN_LINT: ${{ inputs.run_lint }}
          INPUT_RUN_VALIDATE: ${{ inputs.run_validate }}
          INPUT_RUN_UNIT: ${{ inputs.run_unit }}
          INPUT_RUN_FEATURES: ${{ inputs.run_features }}
          INPUT_FEATURES: ${{ inputs.features }}
          INPUT_RUN_MACOS: ${{ inputs.run_macos }}
          INPUT_MACOS_FEATURES: ${{ inputs.macos_features }}
          INPUT_RUN_DIST: ${{ inputs.run_dist }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # ── Resolve features ──────────────────────────────────────────────
          # INPUT_FEATURES can be:
          #   - a JSON array string (from workflow_call via cicd.yaml) → pass through as-is
          #   - blank (from direct workflow_dispatch with no override) → discover all
          #   - a comma-separated list (from direct workflow_dispatch form) → parse and convert
          if [[ "${INPUT_FEATURES:-}" == \[* ]]; then
            features="$INPUT_FEATURES"
          elif [[ -z "${INPUT_FEATURES:-}" ]]; then
            features=$(ls -1 features | jq -R . | jq -sc .)
          else
            features=$(printf '%s\n' "$INPUT_FEATURES" | tr ',' '\n' | tr -d ' ' \
              | grep -v '^$' | jq -R . | jq -sc .)
          fi

          # ── Resolve macos_features ────────────────────────────────────────
          if [[ "${INPUT_MACOS_FEATURES:-}" == \[* ]]; then
            macos_features="$INPUT_MACOS_FEATURES"
          elif [[ -z "${INPUT_MACOS_FEATURES:-}" ]]; then
            macos_capable=$(find test -mindepth 3 -maxdepth 3 -name "*.sh" -path "*/macos/*" \
              | sed 's|test/||; s|/macos/.*||' | sort -u)
            macos_features=$(printf '%s\n' "$macos_capable" | grep -v '^$' | jq -R . | jq -sc .)
          else
            macos_features=$(printf '%s\n' "$INPUT_MACOS_FEATURES" | tr ',' '\n' | tr -d ' ' \
              | grep -v '^$' | jq -R . | jq -sc .)
          fi

          # ── run_prepare: true if any job that consumes artifacts is requested ─
          run_prepare=false
          for flag in "$INPUT_RUN_LINT" "$INPUT_RUN_VALIDATE" "$INPUT_RUN_UNIT" "$INPUT_RUN_FEATURES" "$INPUT_RUN_MACOS" "$INPUT_RUN_DIST"; do
            if [[ "$flag" == "true" ]]; then
              run_prepare=true
              break
            fi
          done

          # ── Resolve version ───────────────────────────────────────────────
          version="${INPUT_VERSION:-${GITHUB_SHA}}"

          {
            echo "run_lint=$INPUT_RUN_LINT"
            echo "run_validate=$INPUT_RUN_VALIDATE"
            echo "run_unit=$INPUT_RUN_UNIT"
            echo "run_features=$INPUT_RUN_FEATURES"
            echo "features=$features"
            echo "run_macos=$INPUT_RUN_MACOS"
            echo "macos_features=$macos_features"
            echo "run_dist=$INPUT_RUN_DIST"
            echo "run_prepare=$run_prepare"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

  # ── Prepare: sync src/, build dist/, upload artifacts ────────────────────
  prepare:
    name: "Prepare"
    needs: setup
    if: needs.setup.outputs.run_prepare == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PyYAML
        run: pip3 install -r requirements.txt

      - name: Sync Library Files
        run: bash sync-lib.sh

      - name: Build Distribution Artifacts
        run: bash build-artifacts.sh "${{ needs.setup.outputs.version }}"

      - name: Upload src/ artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sysset-src
          path: src/
          include-hidden-files: true
          retention-days: 1

      - name: Upload dist/ artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sysset-dist
          path: dist/
          retention-days: 1

  # ── Lint (shfmt + shellcheck) ─────────────────────────────────────────────
  lint:
    name: "Format & lint"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shfmt and shellcheck
        run: bash scripts/setup-dev.sh --tools shfmt,shellcheck

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Check formatting (shfmt)"
        run: make format-check

      - name: "Lint (shellcheck)"
        run: make lint

  # ── Validate devcontainer-feature.json files ──────────────────────────────
  validate:
    name: "Validate feature metadata"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Validate devcontainer-feature.json files"
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          validate-only: "true"
          base-path-to-features: "./src"

  # ── Unit tests (native: ubuntu + macOS) ───────────────────────────────────
  unit-native:
    name: "Unit tests (${{ matrix.os }})"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_unit == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Install bash ≥4 (macOS)"
        if: runner.os == 'macOS'
        run: brew install bash

      - name: "Run unit tests"
        run: bash test/run-unit.sh

  # ── Unit tests (Linux distribution containers) ────────────────────────────
  unit-linux:
    name: "Unit tests (container / ${{ matrix.distro }})"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_unit == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:bookworm
            install: apt-get update -qq && apt-get install -y --no-install-recommends bash ca-certificates git jq
          - distro: fedora
            image: fedora:latest
            install: dnf install -y bash git jq
          - distro: rockylinux
            image: rockylinux:9
            install: dnf install -y bash git jq
          - distro: alpine
            image: alpine:3.20
            install: apk add --no-cache bash git jq
    steps:
      - name: "Checkout (with submodules)"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Run unit tests in container"
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ${{ matrix.image }} \
            sh -c "${{ matrix.install }} && bash test/run-unit.sh"

  # ── Feature scenario tests (Linux / devcontainer) ─────────────────────────
  test-features:
    name: "Test ${{ matrix.feature }}"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_features == 'true' && needs.setup.outputs.features != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJSON(needs.setup.outputs.features) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: Install Devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test Feature Scenarios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash test/run.sh feature "${{ matrix.feature }}"

  # ── install-os-pkg manifest resolution (6 distros) ────────────────────────
  test-os-pkg:
    name: "Test install-os-pkg manifest resolution (${{ matrix.image }})"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_features == 'true' && contains(fromJSON(needs.setup.outputs.features), 'install-os-pkg')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: debian:latest
          - image: ubuntu:latest
          - image: alpine:latest
          - image: fedora:latest
          - image: opensuse/leap:latest
          - image: archlinux:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Run manifest resolution tests"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -e GITHUB_TOKEN \
            "${{ matrix.image }}" \
            sh -c 'command -v bash >/dev/null 2>&1 || apk add --no-cache bash >/dev/null 2>&1; bash /repo/test/install-os-pkg/dry-run/run.sh'

  # ── Feature scenario tests (macOS native) ─────────────────────────────────
  test-macos:
    name: "Test ${{ matrix.feature }} (macOS)"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_macos == 'true' && needs.setup.outputs.macos_features != '[]'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJSON(needs.setup.outputs.macos_features) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: "Test ${{ matrix.feature }} macOS scenarios"
        run: bash test/run-macos.sh "${{ matrix.feature }}"

  # ── Dist: build artifacts ─────────────────────────────────────────────────
  test-dist-build:
    name: "Dist: build artifacts"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_dist == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download src/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-src
          path: src/

      - name: Install PyYAML
        run: pip3 install -r requirements.txt

      - name: "Run build scenario"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash test/dist/run.sh --suite build --version v0.1.0-test

  # ── Dist: get/ scenarios ──────────────────────────────────────────────────
  test-dist-get:
    name: "Dist: get/ scenarios"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_dist == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download dist/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-dist
          path: dist/

      - name: "Run get/ scenarios"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash test/dist/run.sh --suite get --no-build

  # ── Dist: sysset/ scenarios (Linux containers) ────────────────────────────
  test-dist-sysset:
    name: "Dist: sysset/ scenarios (${{ matrix.distro }})"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_dist == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:bookworm
            pre: "apt-get update -qq && apt-get install -y --no-install-recommends bash jq curl ca-certificates"
          - distro: ubuntu
            image: ubuntu:24.04
            pre: "apt-get update -qq && apt-get install -y --no-install-recommends bash jq curl ca-certificates"
          - distro: alpine
            image: alpine:3.20
            pre: "apk add --no-cache bash jq curl ca-certificates"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download dist/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-dist
          path: dist/

      - name: "Run sysset/ scenarios inside ${{ matrix.distro }} container"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            --network host \
            -v "$GITHUB_WORKSPACE:/repo" \
            -w /repo \
            -e GITHUB_TOKEN \
            "${{ matrix.image }}" \
            sh -c "${{ matrix.pre }} && bash test/dist/run.sh --suite sysset --no-build"

  # ── Dist: macOS scenarios ─────────────────────────────────────────────────
  test-dist-macos:
    name: "Dist: macOS scenarios"
    needs: [setup, prepare]
    if: needs.setup.outputs.run_dist == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download dist/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sysset-dist
          path: dist/

      - name: "Install bash ≥4 (macOS)"
        run: brew install bash

      - name: "Run macOS dist scenarios"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash test/dist/run.sh --suite macos --no-build
